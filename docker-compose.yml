services:
  postgres:
    image: postgres:16-alpine
    container_name: bodytrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bodytrack
      POSTGRES_PASSWORD: bodytrack_secret
      POSTGRES_DB: bodytrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
